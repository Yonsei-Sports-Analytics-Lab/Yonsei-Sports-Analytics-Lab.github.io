    <script>
    fetch('../links.json')
        .then(response => response.json())
        .then(data => {
            const applyButtons = document.querySelectorAll('.dynamic-apply-link');
            applyButtons.forEach(button => {
                button.href = data.applyForm;
            });
            document.getElementById('icon-insta').href = data.instagram;
        })
        .catch(error => console.error('링크 데이터를 불러오는데 실패했습니다:', error));
    </script>
